services:
  docs:
    image: starwars_api_local_docs
    container_name: starwars_api_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - ./docs:/docs:z
      - .:/app:z
    ports:
      - '9000:9000'
    command: /start-docs
